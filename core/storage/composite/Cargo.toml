# Package name (nexus-storage-composite) preserved for backward compatibility.
# Directory name (composite/) reflects the 3-tier KV+Blob+Object architecture.
[package]
name = "nexus-storage-composite"
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
log.workspace = true
nexus-model = { path = "../../model" }
postcard = { version = "1", features = ["alloc"] }
serde.workspace = true
serde_json.workspace = true

[dev-dependencies]
nexus-graph = { path = "../../graph" }
nexus-storage-petgraph = { path = "../petgraph" }
tempfile = "3"

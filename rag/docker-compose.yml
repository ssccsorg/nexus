# docker-compose.yml — RAG engines
# Usage:
#   docker compose --profile lightrag up -d
#   docker compose --profile edgequake up -d
#   docker compose --profile lightrag --profile edgequake up -d  (both)

services:
  # ── LightRAG ──────────────────────────────────────────────────────────
  lightrag:
    profiles: [lightrag]
    build:
      context: .
      dockerfile: Dockerfile.lightrag
    image: lightrag-nexus:local
    container_name: lightrag-nexus
    restart: unless-stopped
    ports:
      - "${LIGHTRAG_PORT:-9621}:9621"
    volumes:
      - "${LIGHTRAG_DATA:-./lightrag-data}:/app/data"
    environment:
      - HOST=0.0.0.0
      - PORT=9621
      - LLM_BINDING_HOST=${LMSTUDIO_URL:-http://localhost:1234}/v1
      - CHAT_MODEL=${LLM_MODEL:-liquid/lfm2.5-1.2b}
      - EMBEDDING_BINDING_HOST=${LMSTUDIO_URL:-http://localhost:1234}/v1
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-nomic-embed-text-v1.5}
      - EMBEDDING_DIM=${EMBEDDING_DIM:-768}
      - WORKING_DIR=/app/data
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "9621"
      - "--working-dir"
      - "/app/data"
      - "--workspace"
      - "default"
      - "--llm-binding"
      - "openai"
      - "--embedding-binding"
      - "openai"
      - "--log-level"
      - "INFO"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9621/health | grep -q healthy"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # ── EdgeQuake (prebuilt image) ────────────────────────────────────────
  edgequake:
    profiles: [edgequake]
    image: ${EDGEQUAKE_IMAGE:-ghcr.io/ssccs/edgequake:latest}
    pull_policy: ${EDGEQUAKE_PULL:-missing}
    container_name: edgequake-nexus
    restart: unless-stopped
    ports:
      - "${EDGEQUAKE_PORT:-8080}:8080"
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - EDGEQUAKE_LLM_PROVIDER=openai
      - EDGEQUAKE_LLM_MODEL=${LLM_MODEL:-liquid/lfm2.5-1.2b}
      - OPENAI_BASE_URL=${LMSTUDIO_URL:-http://localhost:1234}/v1
      - OPENAI_API_KEY=not-needed
      - EDGEQUAKE_EMBEDDING_PROVIDER=openai
      - EDGEQUAKE_EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-nomic-embed-text-v1.5}
      - EDGEQUAKE_EMBEDDING_BASE_URL=${LMSTUDIO_URL:-http://localhost:1234}/v1
      - EDGEQUAKE_EMBEDDING_DIMENSION=${EMBEDDING_DIM:-768}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

# docker-compose.yml — RAG engines
# Usage:
#   docker compose --profile lightrag up -d
#   docker compose --profile edgequake up -d

services:
  # ── LightRAG ──────────────────────────────────────────────────────────
  lightrag:
    profiles: [lightrag]
    build:
      context: ./lightrag
      dockerfile: Dockerfile
    image: lightrag-nexus:local
    container_name: lightrag-nexus
    restart: unless-stopped
    ports:
      - "${LIGHTRAG_PORT:-9621}:9621"
    volumes:
      - "${LIGHTRAG_DATA:-./lightrag/data}:/work/data"
    environment:
      - HOST=0.0.0.0
      - PORT=9621
      - LLM_BINDING_HOST=${LMSTUDIO_URL:-http://localhost:1234}/v1
      - CHAT_MODEL=${LLM_MODEL:-liquid/lfm2.5-1.2b}
      - EMBEDDING_BINDING_HOST=${LMSTUDIO_URL:-http://localhost:1234}/v1
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-nomic-embed-text-v1.5}
      - EMBEDDING_DIM=${EMBEDDING_DIM:-768}
      - WORKING_DIR=/work/data
    command:
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "9621"
      - "--working-dir"
      - "/work/data"
      - "--workspace"
      - "default"
      - "--llm-binding"
      - "openai"
      - "--embedding-binding"
      - "openai"
      - "--log-level"
      - "INFO"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; r=urllib.request.urlopen('http://localhost:9621/health'); exit(0 if b'healthy' in r.read() else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # ── EdgeQuake API (prebuilt) ──────────────────────────────────────────
  edgequake:
    profiles: [edgequake]
    image: ghcr.io/raphaelmansuy/edgequake:${EDGEQUAKE_VERSION:-latest}
    pull_policy: ${EDGEQUAKE_PULL:-missing}
    container_name: edgequake-nexus
    restart: unless-stopped
    ports:
      - "${EDGEQUAKE_PORT:-8080}:8080"
    environment:
      - EDGEQUAKE_HOST=0.0.0.0
      - EDGEQUAKE_PORT=8080
      - DATABASE_URL=postgres://edgequake:${POSTGRES_PASSWORD:-edgequake_secret}@postgres:5432/edgequake
      - EDGEQUAKE_LLM_PROVIDER=openai
      - OPENAI_BASE_URL=http://host.docker.internal:${LMSTUDIO_PORT:-1234}/v1
      - OPENAI_API_KEY=not-needed
      - EDGEQUAKE_EMBEDDING_PROVIDER=openai
      - EDGEQUAKE_EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-nomic-embed-text-v1.5}
      - EDGEQUAKE_EMBEDDING_BASE_URL=http://host.docker.internal:${LMSTUDIO_PORT:-1234}/v1
      - EDGEQUAKE_EMBEDDING_DIMENSION=${EMBEDDING_DIM:-768}
      - RUST_LOG=${RUST_LOG:-info}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - edgequake-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── EdgeQuake Frontend (prebuilt) ────────────────────────────────────
  frontend:
    profiles: [edgequake]
    image: ghcr.io/raphaelmansuy/edgequake-frontend:${EDGEQUAKE_VERSION:-latest}
    pull_policy: ${EDGEQUAKE_PULL:-missing}
    container_name: edgequake-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      edgequake:
        condition: service_healthy
    networks:
      - edgequake-net

  # ── PostgreSQL (EdgeQuake dependency) ─────────────────────────────────
  postgres:
    profiles: [edgequake]
    image: ghcr.io/raphaelmansuy/edgequake-postgres:${EDGEQUAKE_VERSION:-latest}
    pull_policy: ${EDGEQUAKE_PULL:-missing}
    container_name: edgequake-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=edgequake
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-edgequake_secret}
      - POSTGRES_DB=edgequake
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./edgequake/init-extensions.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - edgequake-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edgequake -d edgequake"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres-data:

networks:
  edgequake-net:

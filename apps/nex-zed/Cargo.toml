[package]
name = "nex-zed"
version = "0.1.0"
edition.workspace = true
license.workspace = true

description = "neXus instance embedding ACP as one of its communication surfaces for the Zed editor"

[dependencies]
acp-bridge = { path = "acp-bridge" }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
clap = { version = "4", features = ["derive"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }

[dev-dependencies]

[features]
default = []

[[bin]]
name = "nex-zed"
path = "src/main.rs"

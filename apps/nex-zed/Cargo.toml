[package]
name = "nex-zed"
version = "0.1.0"
edition.workspace = true
license.workspace = true

description = "neXus instance embedding ACP as one of its communication surfaces for the Zed editor"

[dependencies]
agent-client-protocol = "=0.12.1"
agent-client-protocol-schema = "=0.13.2"
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
clap = { version = "4", features = ["derive"] }
anyhow = "1"
async-trait = "0.1"
futures = "0.3"
log = { workspace = true }

[dev-dependencies]

[features]
default = []

[[bin]]
name = "nex-zed"
path = "src/main.rs"

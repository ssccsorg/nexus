name: CI

on:
  pull_request:
    branches: ["main"]
    paths:
      - "workers/**"
      - "graph/**"
      - "rag/**"
      - "run.sh"
      - "*.yml"
      - "Dockerfile"
  workflow_call:

jobs:
  # ── TypeScript Workers ────────────────────────────────────────────
  typecheck-module-hub:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/module-hub
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: workers/module-hub/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  typecheck-af-sync:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/af-sync
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: workers/af-sync/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  # ── Python syntax check ───────────────────────────────────────────
  python-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python3 -m py_compile graph/memgraph/server.py
          python3 -m py_compile graph/memgraph/runner.py
          python3 -m py_compile graph/memgraph/import_lightrag.py
          python3 -m py_compile graph/runners/cli.py
          python3 -m py_compile graph/runners/base.py
          python3 -m py_compile graph/runners/engines.py

  # ── Container build check ─────────────────────────────────────────
  docker-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dockerfile:
          - path: graph/memgraph/Dockerfile
            tag: memgraph-proxy
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v4
      - run: |
          docker build -t ${{ matrix.dockerfile.tag }} \
            -f ${{ matrix.dockerfile.path }} \
            $(dirname ${{ matrix.dockerfile.path }})

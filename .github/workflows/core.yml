name: Build Core

on:
  push:
    branches: ["main"]
    paths:
      - "core/**"
      - ".github/workflows/core.yml"
      - "run.sh"
  pull_request:
    paths:
      - "core/**"
      - ".github/workflows/core.yml"
      - "run.sh"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "core"
          cache-targets: true

      - name: Full check via run.sh
        run: ./run.sh --core

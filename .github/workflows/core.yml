name: Build Core

on:
  push:
    branches: ["main"]
    paths:
      - "core/**"
      - ".github/workflows/core.yml"
  pull_request:
    paths:
      - "core/**"
      - ".github/workflows/core.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - run: cargo check

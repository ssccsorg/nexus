name: Build Core

on:
  push:
    branches: ["main"]
    paths:
      - "core/**"
      - ".github/workflows/core.yml"
  pull_request:
    paths:
      - "core/**"
      - ".github/workflows/core.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "core"
          cache-targets: true

      - name: Check (cypher crate)
        run: cargo check -p nexus-cypher

      - name: Check (full workspace)
        run: cargo check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test -p nexus-cypher

      - name: Test (full workspace)
        run: cargo test

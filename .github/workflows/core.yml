name: Build Core

on:
  push:
    branches: ["main"]
    paths:
      - "core/**"
      - ".github/workflows/core.yml"
      - "run.sh"
  pull_request:
    paths:
      - "core/**"
      - ".github/workflows/core.yml"
      - "run.sh"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "core"
          cache-targets: true

      - name: Format
        run: cargo fmt --check

      - name: Check (graph crate)
        run: cargo check -p nexus-graph

      - name: Check (full workspace)
        run: cargo check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Test (graph crate)
        run: cargo test -p nexus-graph

      - name: Test (full workspace)
        run: cargo test

      - name: Verify run.sh matches CI
        run: |
          cd ..
          ./run.sh --core 2>&1 | tail -5

name: Deploy Gateway

on:
  push:
    branches: ["main"]
    paths:
      - "gateway/**"
      - ".github/workflows/deploy.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "gateway/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # PR check: verify npm install works (no deploy on PR)
  check:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: |
            gateway/module-hub/package-lock.json
            gateway/af-sync/package-lock.json
      - name: npm ci check
        run: ./scripts/deploy-gateway.sh --check

  # Push deploy: only on main merge
  deploy:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: |
            gateway/module-hub/package-lock.json
            gateway/af-sync/package-lock.json
      - name: Deploy workers
        run: ./scripts/deploy-gateway.sh
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}

name: Deploy Workers

on:
  push:
    branches: ["main"]
    paths:
      - "workers/**"
      - ".github/workflows/deploy.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "workers/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
  # Placeholder: ssccs core repo → R2 업로드 후 트리거 (VPS 준비되면 활성화)
  # repository_dispatch:
  #   types:
  #     - ssccs-poc-agent-af
  #     - ssccs-docs-agent-af

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # PR check: verify npm install works (no deploy on PR)
  check-module-hub:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/module-hub
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: workers/module-hub/package-lock.json
      - run: npm ci

  check-af-sync:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/af-sync
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: workers/af-sync/package-lock.json
      - run: npm ci

  deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        worker: [module-hub, af-sync]
    defaults:
      run:
        working-directory: workers/${{ matrix.worker }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: workers/${{ matrix.worker }}/package-lock.json
      - run: npm ci
      - name: Deploy ${{ matrix.worker }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          workingDirectory: workers/${{ matrix.worker }}
          command: deploy

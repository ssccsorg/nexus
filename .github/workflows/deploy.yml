name: Deploy Workers

on:
  push:
    branches: ["main"]
    paths:
      - "workers/**"
      - ".github/workflows/deploy.yml"
  pull_request:
    branches: ["main"]
  workflow_dispatch:
  # Placeholder: ssccs core repo → R2 업로드 후 트리거 (VPS 준비되면 활성화)
  # repository_dispatch:
  #   types:
  #     - ssccs-poc-agent-af
  #     - ssccs-docs-agent-af

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-module-hub:
    if: ${{ contains(github.event.head_commit.modified, 'workers/module-hub/') || contains(github.event.head_commit.added, 'workers/module-hub/') }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/module-hub
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: workers/module-hub/package-lock.json
      - run: npm ci
      - name: Deploy module-hub
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          workingDirectory: workers/module-hub
          command: deploy

  deploy-af-sync:
    if: ${{ contains(github.event.head_commit.modified, 'workers/af-sync/') || contains(github.event.head_commit.added, 'workers/af-sync/') }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: workers/af-sync
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: workers/af-sync/package-lock.json
      - run: npm ci
      - name: Deploy af-sync
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          workingDirectory: workers/af-sync
          command: deploy

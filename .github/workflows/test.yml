name: Test Suite

on:
  push:
    branches: ["main"]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "model/**"
      - "nex/**"
      - "nexd/**"
      - "interface/**"
      - "storage/**"
      - "libs/**"
      - "playbooks/**"
      - "scripts/**"
      - "run.sh"
      - ".github/workflows/test.yml"
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "model/**"
      - "nex/**"
      - "nexd/**"
      - "interface/**"
      - "storage/**"
      - "libs/**"
      - "playbooks/**"
      - "scripts/**"
      - "run.sh"
      - ".github/workflows/test.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            model
            nex
            nexd
            interface/query
            interface/cypher
            storage/duckdb
            storage/sim
            storage/composite
            storage/petgraph
            libs/serde-proxy
            playbooks/agents
          cache-targets: true
          cache-on-failure: true
      - name: Core checks
        run: bash ./run.sh --core

  apps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            nexd
            apps/nex-spinwasi-ssccsdocs
          cache-targets: true
          cache-on-failure: true
      - uses: fermyon/actions/spin@v2
      - name: App verification
        run: bash ./run.sh --apps

  playbooks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            model
            nex
            interface/query
            interface/cypher
            playbooks/agents
          cache-targets: true
          cache-on-failure: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Playbook verification
        run: bash ./run.sh --playbooks

name: Test Suite

on:
  push:
    branches: ["main"]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "model/**"
      - "nex/**"
      - "nexd/**"
      - "nex-server/**"
      - "gateway/**"
      - "apps/nex-api/**"
      - "apps/nex-cf/**"
      - "interface/**"
      - "storage/**"
      - "libs/**"
      - "apps/nex-spinwasi-ssccsdocs/**"
      - "apps/nex-calc/**"
      - "playbooks/**"
      - "scripts/**"
      - "run.sh"
      - ".github/workflows/test.yml"
      - "!**/*.md"
      - "!**/*.qmd"
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "model/**"
      - "nex/**"
      - "nexd/**"
      - "nex-server/**"
      - "gateway/**"
      - "apps/nex-api/**"
      - "apps/nex-cf/**"
      - "interface/**"
      - "storage/**"
      - "libs/**"
      - "apps/nex-spinwasi-ssccsdocs/**"
      - "apps/nex-calc/**"
      - "playbooks/**"
      - "scripts/**"
      - "run.sh"
      - ".github/workflows/test.yml"
      - "!**/*.md"
      - "!**/*.qmd"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            model
            nex
            nexd
            interface/query
            interface/cypher
            storage/duckdb
            storage/sim
            storage/composite
            storage/petgraph
            libs/serde-proxy
            playbooks/agents
            nex-server/server
            nex-server/client
          cache-targets: true
          cache-on-failure: true
      - name: Core checks
        run: bash ./run.sh --core
      - name: nex-server build check
        run: cargo check -p nex-server && cargo check -p nex-client

  gateway:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            apps/nex-api
            apps/nex-cf
          cache-targets: true
      - name: Gateway checks
        run: bash ./scripts/run-gateway.sh

  apps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            nexd
            apps/nex-spinwasi-ssccsdocs
            apps/nex-calc
          cache-targets: true
          cache-on-failure: true
      - name: Install socat (required for Unix socket RPC)
        run: sudo apt-get update && sudo apt-get install -y socat
      - uses: fermyon/actions/spin/setup@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: App verification
        run: bash ./run.sh --apps
      - name: nex-server verification
        run: bash ./run.sh --server

  playbooks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            model
            nex
            interface/query
            interface/cypher
            playbooks/agents
          cache-targets: true
          cache-on-failure: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Playbook verification
        run: bash ./run.sh --playbooks

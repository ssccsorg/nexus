name: Test Suite

on:
  push:
    branches: ["main"]
    paths:
      - "core/**"
      - "gateway/**"
      - "playbooks/**"
      - "scripts/**"
      - ".github/workflows/test.yml"
  pull_request:
    paths:
      - "core/**"
      - "gateway/**"
      - "playbooks/**"
      - "scripts/**"
      - ".github/workflows/test.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # Layer 1: Core library (nexus-api + nexus-graph + nexus-table)
  # Entry point: scripts/run-core.sh
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "core"
          cache-targets: true

      - name: Core checks
        run: ./scripts/run-core.sh

  # Layer 2: Gateway server + consumer playbooks
  # Entry point: playbooks/run.sh (self-contained, starts/stops server)
  gateway:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            gateway/api
            playbooks/agents
          cache-targets: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Gateway + playbook verification
        run: ./playbooks/run.sh

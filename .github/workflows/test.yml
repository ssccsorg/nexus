name: Test Suite

on:
  push:
    branches: ["main"]
    paths:
      - "core/**"
      - "gateway/**"
      - "playbooks/**"
      - "scripts/**"
      - ".github/workflows/test.yml"
  pull_request:
    paths:
      - "core/**"
      - "gateway/**"
      - "playbooks/**"
      - "scripts/**"
      - ".github/workflows/test.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            core
            ext
          cache-targets: true
      - name: Core checks
        run: ./run.sh --core

  gateway-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "gateway/api"
          cache-targets: true
      - name: Gateway API tests
        run: ./run.sh --gateway-api

  playbooks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            gateway/api
            playbooks/agents
          cache-targets: true
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Playbook verification
        run: ./run.sh --playbooks

name: Sync Docs

on:
  schedule:
    - cron: "0 6 * * *"   # daily 06:00 UTC
  workflow_dispatch:        # manual trigger
  repository_dispatch:       # ssccs core repo → R2 업로드 후 트리거
    types:
      - ssccs-docs-agent-af

permissions:
  contents: write

jobs:
  sync-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync all artifacts from R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CFR2_USR_API_S3_ACCID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CFR2_USR_API_S3_SECKEY }}
        run: |
          aws s3 sync s3://ssccs-nexus-af/ssccs /tmp/ssccs \
            --endpoint-url ${{ secrets.CFR2_USR_API_HOST }} \
            --delete

      - name: Transform and write README.md
        run: python scripts/fetch_ssccs.py --sync-root /tmp/ssccs

      - name: Commit if changed
        run: |
          if ! git diff --quiet HEAD -- README.md; then
            git config user.name "ssccs-bot"
            git config user.email "bot@ssccs.org"
            git add README.md
            git commit -m "sync: update README.md from ssccs docs"
            git push
          else
            echo "README.md unchanged — nothing to commit"
          fi

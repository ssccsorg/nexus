name: Build Containers

on:
  push:
    branches: ["main"]
    paths:
      - "ext/lightrag/Dockerfile"
      - "ext/graphiti/Dockerfile"
      - "ext/memgraph/Dockerfile"
      - ".github/workflows/build.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "ext/lightrag/Dockerfile"
      - "ext/graphiti/Dockerfile"
      - "ext/memgraph/Dockerfile"
      - ".github/workflows/build.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build containers
        run: ./scripts/run-build-containers.sh

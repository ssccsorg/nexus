name: Build Containers

on:
  push:
    branches: ["main"]
    paths:
      - "ext/lightrag/Dockerfile"
      - "ext/graphiti/Dockerfile"
      - "ext/memgraph/Dockerfile"
      - ".github/workflows/build.yml"
      - "run.sh"
  pull_request:
    branches: ["main"]
    paths:
      - "ext/lightrag/Dockerfile"
      - "ext/graphiti/Dockerfile"
      - "ext/memgraph/Dockerfile"
      - ".github/workflows/build.yml"
      - "run.sh"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build through run.sh
        run: ./run.sh --docker

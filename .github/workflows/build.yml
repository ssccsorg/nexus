name: Build Containers

on:
  push:
    branches: ["main"]
    paths:
      - "engines/rag/lightrag/Dockerfile"
      - "engines/memgraph/memgraph/Dockerfile"
      - ".github/workflows/build.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "engines/rag/lightrag/Dockerfile"
      - "engines/memgraph/memgraph/Dockerfile"
      - ".github/workflows/build.yml"
  # Placeholder: ssccs core repo → R2 업로드 후 컨테이너 재빌드 트리거
  # repository_dispatch:
  #   types:
  #     - ssccs-poc-agent-af
  #     - ssccs-docs-agent-af
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build LightRAG image
        run: docker build -t lightrag-nexus -f engines/rag/lightrag/Dockerfile engines/rag/lightrag

      - name: Build Memgraph proxy image
        run: docker build -t memgraph-proxy -f engines/memgraph/memgraph/Dockerfile engines/memgraph/memgraph

name: Build Containers

on:
  push:
    branches: ["main"]
    paths:
      - "ext/lightrag/Dockerfile"
      - "ext/graphiti/Dockerfile"
      - "ext/memgraph/Dockerfile"
      - ".github/workflows/build.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "ext/lightrag/Dockerfile"
      - "ext/graphiti/Dockerfile"
      - "ext/memgraph/Dockerfile"
      - ".github/workflows/build.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build LightRAG image
        run: docker build -t lightrag-nexus -f ext/lightrag/Dockerfile ext/lightrag

      - name: Build Graphiti image
        run: docker build -t graphiti-nexus -f ext/graphiti/Dockerfile ext/graphiti

      - name: Build Memgraph proxy image
        run: docker build -t memgraph-proxy -f ext/memgraph/Dockerfile ext/memgraph

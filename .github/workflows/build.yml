name: Build Containers

on:
  push:
    branches: ["main"]
    paths:
      - "rag/lightrag/Dockerfile"
      - "graph/memgraph/Dockerfile"
      - "rag/lightrag/**/*.py"
      - "graph/memgraph/**/*.py"
      - "rag/runners/**/*.py"
      - "graph/runners/**/*.py"
      - ".github/workflows/build.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "rag/lightrag/Dockerfile"
      - "graph/memgraph/Dockerfile"
      - "rag/lightrag/**/*.py"
      - "graph/memgraph/**/*.py"
      - "rag/runners/**/*.py"
      - "graph/runners/**/*.py"
      - ".github/workflows/build.yml"
  # Placeholder: ssccs core repo → R2 업로드 후 컨테이너 재빌드 트리거
  # repository_dispatch:
  #   types:
  #     - ssccs-poc-agent-af
  #     - ssccs-docs-agent-af
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build LightRAG image
        run: docker build -t lightrag-nexus -f rag/lightrag/Dockerfile rag/lightrag

      - name: Build Memgraph proxy image
        run: docker build -t memgraph-proxy -f graph/memgraph/Dockerfile graph/memgraph

      - name: Check Python syntax
        run: |
          python3 -m py_compile graph/memgraph/server.py
          python3 -m py_compile graph/memgraph/import_lightrag.py
          python3 -m py_compile graph/runners/cli.py
          python3 -m py_compile graph/runners/base.py
          python3 -m py_compile graph/runners/engines.py
          python3 -m py_compile rag/runners/cli.py
          python3 -m py_compile rag/runners/base.py
          python3 -m py_compile rag/runners/engines.py

      - name: Smoke test (Memgraph + proxy)
        run: |
          docker run -d --name memgraph-nexus -p 7688:7687 memgraph/memgraph-platform
          for i in $(seq 1 10); do
            docker exec memgraph-nexus mgconsole --query "RETURN 1" 2>/dev/null | grep -q "1" && break
            sleep 2
          done
          docker run -d --name memgraph-proxy -p 7689:7689 \
            -e MEMGRAPH_HOST=host.docker.internal -e MEMGRAPH_PORT=7688 \
            memgraph-proxy
          sleep 3
          curl -sf -X POST http://localhost:7689/cypher \
            -H "Content-Type: application/json" \
            -d '{"query":"RETURN 1 AS n"}' | grep -q '"n":1'
